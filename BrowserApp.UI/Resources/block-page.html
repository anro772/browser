<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Blocked</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #060810;
    --bg-primary: #0B0E14;
    --bg-surface: #111520;
    --bg-elevated: #161B28;
    --border-subtle: rgba(255,255,255,0.06);
    --border-accent: rgba(59,130,246,0.3);
    --text-primary: #E8ECF4;
    --text-secondary: #8291A8;
    --text-tertiary: #4F5D73;
    --accent: #3B82F6;
    --accent-glow: rgba(59,130,246,0.15);
    --danger: #EF4444;
    --danger-muted: rgba(239,68,68,0.12);
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Ambient background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black 20%, transparent 70%);
    pointer-events: none;
  }

  /* Top-center glow */
  body::after {
    content: '';
    position: fixed;
    top: -180px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(59,130,246,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    width: 100%;
    padding: 0 24px;
    animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Shield icon */
  .icon-wrapper {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: var(--danger-muted);
    border: 1px solid rgba(239,68,68,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.05s both;
  }

  .icon-wrapper svg {
    width: 30px;
    height: 30px;
    color: var(--danger);
    opacity: 0.9;
  }

  /* Typography */
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.15;
    margin-bottom: 12px;
    animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
  }

  .description {
    font-size: 15px;
    font-weight: 300;
    line-height: 1.6;
    color: var(--text-secondary);
    margin-bottom: 28px;
    animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
  }

  /* Info card */
  .info-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 28px;
    animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }

  .info-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 6px 0;
  }

  .info-row + .info-row {
    border-top: 1px solid var(--border-subtle);
    margin-top: 6px;
    padding-top: 12px;
  }

  .info-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-tertiary);
    flex-shrink: 0;
    min-width: 72px;
  }

  .info-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    word-break: break-all;
  }

  .info-value.category {
    color: var(--danger);
    background: var(--danger-muted);
    padding: 2px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  .info-value.url {
    color: var(--text-secondary);
    font-weight: 300;
    font-size: 12px;
  }

  /* Contact note */
  .contact {
    font-size: 13px;
    font-weight: 300;
    font-style: italic;
    color: var(--text-tertiary);
    margin-bottom: 24px;
    animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
  }

  /* Button */
  .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  .btn-back:hover {
    background: var(--accent-glow);
    border-color: var(--border-accent);
    color: #fff;
  }

  .btn-back:active {
    transform: scale(0.97);
  }

  .btn-back svg {
    width: 16px;
    height: 16px;
    opacity: 0.6;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
      </svg>
    </div>

    <h1>Access Blocked</h1>

    <p class="description">
      This site has been blocked by your organization's content policy.
    </p>

    <div class="info-card">
      <div class="info-row">
        <span class="info-label">Category</span>
        <span class="info-value category">{{CATEGORY_NAME}}</span>
      </div>
      <div class="info-row">
        <span class="info-label">URL</span>
        <span class="info-value url">{{BLOCKED_URL}}</span>
      </div>
    </div>

    <p class="contact">Contact your administrator if you believe this is an error.</p>

    <button class="btn-back" onclick="history.back()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Go Back
    </button>
  </div>
</body>
</html>
